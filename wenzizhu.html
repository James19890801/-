<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文子珠 · 简历</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #2e3a42;
    --ink-light: #3d4f5a;
    --accent: #4a6274;
    --accent-warm: #b8a070;
    --accent-green: #5a8070;
    --sidebar-bg: #4a6274;
    --sidebar-text: #dce6ec;
    --sidebar-dim: #a8bec9;
    --metric-bg: #f0f4f2;
    --metric-text: #3d6458;
    --metric-border: #b0ccc4;
    --award-bg: #faf6ee;
    --award-border: #c8aa7a;
    --rule: #dde6e2;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #e8e4de;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 32px 16px;
    color: var(--ink);
  }
  .resume {
    display: flex;
    flex-direction: row;
    width: 880px;
    background: #faf9f7;
    border-radius: 6px;
    box-shadow: 0 8px 48px rgba(60,70,65,0.14);
    overflow: hidden;
  }
  .sidebar {
    width: 248px;
    flex-shrink: 0;
    background: var(--sidebar-bg);
    color: var(--sidebar-text);
    padding: 32px 22px 32px 22px;
    print-color-adjust: exact;
    -webkit-print-color-adjust: exact;
  }
  .avatar-placeholder {
    display: block;
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: rgba(220,230,236,0.2);
    margin: 0 auto 14px;
    border: 3px solid rgba(220,230,236,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    color: var(--sidebar-dim);
  }
  .name-block { text-align: center; margin-bottom: 18px; }
  .name-cn { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: 2px; }
  .name-intent { font-size: 11px; color: var(--sidebar-dim); margin-top: 4px; letter-spacing: 0.5px; }
  .sb-section { margin-bottom: 18px; }
  .sb-label {
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent-warm);
    border-bottom: 1px solid rgba(184,160,112,0.35);
    padding-bottom: 4px;
    margin-bottom: 9px;
  }
  .contact-list { list-style: none; }
  .contact-list li {
    font-size: 11px;
    color: var(--sidebar-dim);
    padding: 3px 0;
    display: flex;
    align-items: flex-start;
    gap: 7px;
    line-height: 1.5;
  }
  .contact-list li span { color: var(--sidebar-text); }
  .skill-tag {
    display: inline-block;
    background: rgba(220,230,236,0.13);
    border: 1px solid rgba(220,230,236,0.25);
    color: var(--sidebar-dim);
    font-size: 10.5px;
    padding: 3px 8px;
    border-radius: 3px;
    margin: 2px 2px 2px 0;
    line-height: 1.5;
  }
  .main {
    flex: 1;
    padding: 32px 30px 40px 28px;
    overflow: hidden;
  }
  .main-header { margin-bottom: 20px; border-bottom: 2px solid var(--rule); padding-bottom: 16px; }
  .main-name { font-size: 24px; font-weight: 700; color: var(--ink); letter-spacing: 2px; }
  .main-intent { font-size: 13px; color: var(--accent); font-weight: 500; margin-top: 4px; }
  .section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
    border-left: 3px solid var(--accent-warm);
    padding-left: 8px;
    margin: 22px 0 12px;
  }
  .exp-block { margin-bottom: 14px; }
  .exp-divider { border: none; border-top: 1px solid var(--rule); margin: 14px 0; }
  .exp-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
  .exp-company { font-size: 14px; font-weight: 700; color: var(--ink); }
  .badge { font-size: 10px; font-weight: 400; background: var(--metric-bg); color: var(--accent); border-radius: 3px; padding: 1px 7px; border: 1px solid var(--metric-border); }
  .bullet-list { list-style: none; padding-left: 0; }
  .bullet-list li { font-size: 11.5px; line-height: 1.7; color: var(--ink-light); padding: 1.5px 0 1.5px 13px; position: relative; }
  .bullet-list li::before { content: "–"; position: absolute; left: 0; color: var(--accent-warm); }
  @media print {
    body { background: none; padding: 0; }
    .resume { box-shadow: none; width: 100%; }
    .fab-wrap { display: none !important; }
  }
  .fab-wrap { position: fixed; top: 20px; right: 20px; z-index: 999; }
  .fab-btn { background: #4a6274; color: #fff; border: none; border-radius: 8px; padding: 9px 16px; font-size: 13px; cursor: pointer; box-shadow: 0 4px 16px rgba(74,98,116,0.35); display: flex; align-items: center; gap: 7px; -webkit-appearance: none; appearance: none; }
  .fab-btn:hover { background: #3a5264; }
  @media (max-width: 600px) {
    body { padding: 0; background: #faf9f7; align-items: stretch; }
    .resume { flex-direction: column; width: 100%; border-radius: 0; box-shadow: none; }
    .sidebar { width: 100%; padding: 24px 20px 20px; }
    .main { padding: 20px 16px 32px; }
    .fab-wrap { top: 12px; right: 12px; }
  }
</style>
</head>
<body>

<div class="fab-wrap">
  <button class="fab-btn" onclick="exportPDF()">
    <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
    导出 PDF
  </button>
</div>

<div class="resume">
  <aside class="sidebar">
    <div>
      <div class="avatar-placeholder">文</div>
      <div class="name-block">
        <div class="name-cn">文子珠</div>
        <div class="name-intent">简历</div>
      </div>
    </div>

    <div class="sb-section">
      <div class="sb-label">基本信息</div>
      <ul class="contact-list">
        <li>📍 <span>地点</span></li>
      </ul>
    </div>

    <div class="sb-section">
      <div class="sb-label">核心技能</div>
      <span class="skill-tag">专业技能</span>
    </div>
  </aside>

  <main class="main">
    <div class="main-header">
      <div class="main-name">文子珠</div>
      <div class="main-intent">简历</div>
    </div>

    <div class="section-title">工作经历</div>
    <div class="exp-block">
      <div class="exp-header">
        <span class="exp-company">工作经历</span>
        <span class="badge">时间</span>
      </div>
      <ul class="bullet-list">
        <li>工作内容</li>
      </ul>
    </div>
  </main>

</div>

<script>
function exportPDF() {
  var btn = document.querySelector('.fab-wrap');
  btn.style.display = 'none';
  var style = document.createElement('style');
  style.id = 'print-override';
  style.innerHTML = '@page { size: A4; margin: 0; } @media print { html, body { width: 210mm; margin: 0 !important; padding: 0 !important; } * { print-color-adjust: exact !important; -webkit-print-color-adjust: exact !important; } .resume { width: 794px !important; flex-direction: row !important; box-shadow: none !important; } .sidebar { width: 248px !important; background: #4a6274 !important; print-color-adjust: exact !important; -webkit-print-color-adjust: exact !important; } }';
  document.head.appendChild(style);
  window.print();
  setTimeout(function() {
    var s = document.getElementById('print-override');
    if (s) s.remove();
    btn.style.display = '';
  }, 1000);
}
</script>
</body>
</html>
